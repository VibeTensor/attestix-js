# Requires npm Trusted Publisher config on npmjs.com:
#   Package settings -> Trusted Publishers -> GitHub Actions
#   Repo: VibeTensor/attestix-js  ·  Workflow: publish.yml  ·  Environment: (none required)
# Until that is configured on the npm side, this workflow will fail at the publish step;
# that is the intended state (publish should be gated by trust on the npm side, not by a secret here).

name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write    # OIDC for npm trusted publishing
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: npm publish (OIDC, no token)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Publish to npm (provenance + public access)
        run: npm publish --provenance --access=public
