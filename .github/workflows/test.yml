name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: vitest (node-${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22']

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        # `npm ci` can fail with "Cannot find module @rollup/rollup-linux-x64-gnu"
        # because of the npm optional-dependencies bug (npm/cli#4828): a
        # package-lock.json generated on one OS omits the installable node entries
        # for other platforms' optional native binaries. Fall back to a fresh
        # install on the runner's platform when that happens.
        run: npm ci || (rm -rf node_modules package-lock.json && npm install)

      - name: Typecheck (tsc --noEmit)
        run: npm run lint

      - name: Run tests (vitest)
        run: npm test

      - name: Build (tsup)
        run: npm run build
